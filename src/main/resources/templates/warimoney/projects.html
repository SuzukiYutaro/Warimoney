<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>プロジェクト一覧</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

	<h1>プロジェクト一覧</h1>
	<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addProjectModal">
		新規
	</button>

	<table class="table table-striped align-middle mt-3">
		<thead>
			<tr>
				<th>プロジェクト名</th>
				<th>作成日</th>
				<th>更新日</th>
			</tr>
		</thead>

		<tbody>
			<tr th:each="project : ${projects}">
				<td>
					<a th:href="@{|/projects/${project.id}|}" th:text="${project.projectName}"></a>
				</td>
				<td th:text="${#temporals.format(project.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
				<td th:text="${#temporals.format(project.updatedAt, 'yyyy/MM/dd HH:mm')}"></td>
				<td>
					<button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#editProjectModal"
						th:attr="data-id=${project.id}, data-name=${project.projectName}">
						編集
					</button>
				</td>
			</tr>
		</tbody>
	</table>

	<form th:action="@{/logout}" method="post">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
		<button type="submit">ログアウト</button>
	</form>

	<div class="modal fade" id="addProjectModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">新規プロジェクト</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<form th:action="@{'/projects'}" method="post">
					<div class="modal-body">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

						<label>プロジェクト名：</label>
						<input type="text" name="projectName" class="form-control" required>

					</div>

					<div class="modal-footer">
						<button type="submit" class="btn btn-primary">追加</button>
					</div>
				</form>

			</div>
		</div>
	</div>

	<div class="modal fade" id="editProjectModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">プロジェクト編集</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<form id="editProjectForm" method="post">
					<div class="modal-body">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

						<label>プロジェクト名：</label>
						<input type="text" name="projectName" id="editProjectName" class="form-control" required>

					</div>

					<div class="modal-footer d-flex justify-content-between">
						<button type="button" class="btn btn-danger" id="deleteProjectBtn">削除</button>

						<div>
							<button type="submit" class="btn btn-primary">保存</button>
						</div>
					</div>
				</form>
				<form id="deleteProjectForm" method="post" style="display:none;">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				</form>

			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	<script th:inline="javascript">
		const editProjectModal = document.getElementById('editProjectModal');
		editProjectModal.addEventListener('show.bs.modal', event => {
			const button = event.relatedTarget;
			const projectId = button.getAttribute('data-id');
			const projectName = button.getAttribute('data-name');

			document.getElementById('editProjectName').value = projectName;
			document.getElementById('editProjectForm').action = `/projects/${projectId}/edit`;
			document.getElementById('deleteProjectForm').action = `/projects/${projectId}/delete`;
		});

		document.getElementById('deleteProjectBtn').addEventListener('click', () => {
			if (confirm('本当にこのプロジェクトを削除しますか？')) {
				document.getElementById('deleteProjectForm').submit();
			}
		});
	</script>

</body>

</html>
