<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>プロジェクト詳細</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">
	<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>


	<h1 th:text="${project.projectName} + ' の詳細'"></h1>

	<hr>

	<!-- プロジェクト基本情報 -->
	<h3>プロジェクト情報</h3>
	<table class="table table-bordered">
		<tr>
			<th>作成日</th>
			<td th:text="${#temporals.format(project.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
		</tr>
		<tr>
			<th>更新日</th>
			<td th:text="${#temporals.format(project.updatedAt, 'yyyy/MM/dd HH:mm')}"></td>
		</tr>
	</table>

	<hr>

	<!-- メンバー一覧 -->
	<h3>メンバー一覧</h3>
	<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addMemberModal">
		メンバー追加
	</button>


	<table class="table table-striped">
		<thead>
			<tr>
				<th>メンバー名</th>
				<th>操作</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="m : ${project.members}">
				<td th:text="${m.memberName}"></td>
				<td>
					<button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#editMemberModal"
						th:attr="data-id=${m.id}, data-name=${m.memberName}">
						編集
					</button>
				</td>
			</tr>

		</tbody>
	</table>



	<hr>

	<!-- 支払い一覧 -->
	<h3>支払い一覧</h3>
	<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
		支払い追加
	</button>


	<table class="table table-striped">
		<thead>
			<tr>
				<th>支払者</th>
				<th>金額</th>
				<th>説明</th>
				<th>日時</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="e : ${project.expenses}">
				<td th:text="${e.payer.memberName}"></td>
				<td th:text="${e.amount}"></td>
				<td th:text="${e.description}"></td>
				<td th:text="${#temporals.format(e.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
				<td>
					<button class="btn btn-sm btn-warning" data-bs-toggle="modal" data-bs-target="#editExpenseModal"
						th:attr="data-id=${e.id}, data-amount=${e.amount}, data-desc=${e.description}, data-payer=${e.payer.id}">
						編集
					</button>
				</td>
			</tr>
		</tbody>
	</table>

	<a th:href="@{/projects}" class="btn btn-secondary">一覧に戻る</a>

	<div class="modal fade" id="addMemberModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">メンバー追加</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<form th:action="@{'/projects/' + ${project.id} + '/members'}" method="post">
					<div class="modal-body">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

						<label>メンバー名：</label>
						<input type="text" name="memberName" class="form-control" required>

					</div>

					<div class="modal-footer">
						<button type="submit" class="btn btn-primary">追加</button>
					</div>
				</form>

			</div>
		</div>
	</div>

	<div class="modal fade" id="editMemberModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">メンバー編集</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<form id="editMemberForm" method="post">
					<div class="modal-body">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

						<label>メンバー名：</label>
						<input type="text" name="memberName" id="editMemberName" class="form-control" required>

					</div>

					<div class="modal-footer d-flex justify-content-between">
						<button type="button" class="btn btn-danger" id="deleteMemberBtn">削除</button>

						<div>
							<button type="submit" class="btn btn-primary">保存</button>
						</div>
					</div>
				</form>
				<form id="deleteMemberForm" method="post" style="display:none;">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				</form>

			</div>
		</div>
	</div>


	<div class="modal fade" id="addExpenseModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">支払い追加</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<form th:action="@{'/projects/' + ${project.id} + '/expenses'}" method="post">
					<div class="modal-body">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

						<label>金額：</label>
						<input type="number" name="amount" class="form-control" required>

						<label class="mt-2">説明：</label>
						<input type="text" name="description" class="form-control" required>

						<label class="mt-2">支払者：</label>
						<select name="payerId" class="form-control" required>
							<option th:each="m : ${project.members}" th:value="${m.id}" th:text="${m.memberName}">
							</option>
						</select>

					</div>

					<div class="modal-footer">
						<button type="submit" class="btn btn-primary">追加</button>
					</div>
				</form>

			</div>
		</div>
	</div>

	<div class="modal fade" id="editExpenseModal" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">支払い編集</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<form id="editExpenseForm" method="post">
					<div class="modal-body">

						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

						<label>金額：</label>
						<input type="number" name="amount" id="editExpenseAmount" class="form-control" required>

						<label class="mt-2">説明：</label>
						<input type="text" name="description" id="editExpenseDesc" class="form-control" required>

						<label class="mt-2">支払者：</label>
						<select name="payerId" id="editExpensePayer" class="form-control" required>
							<option th:each="m : ${project.members}" th:value="${project.id}" th:text="${project.memberName}">
							</option>
						</select>

					</div>

					<div class="modal-footer d-flex justify-content-between">
						<button type="button" class="btn btn-danger" id="deleteExpenseBtn">削除</button>

						<div>
							<button type="submit" class="btn btn-primary">保存</button>
						</div>
					</div>
				</form>
				<form id="deleteExpenseForm" method="post" style="display:none;">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
				</form>

			</div>
		</div>
	</div>




	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	<script th:inline="javascript">
		const projectId = /*[[${project.id}]]*/ 0;

		document.addEventListener("DOMContentLoaded", () => {
			const modal = document.getElementById("editMemberModal");

			modal.addEventListener("show.bs.modal", event => {
				const button = event.relatedTarget;

				const id = button.getAttribute("data-id");
				const name = button.getAttribute("data-name");

				document.getElementById("editMemberName").value = name;

				document.getElementById("editMemberForm").action =
					`/projects/${projectId}/members/${id}/edit`;

				document.getElementById("deleteMemberForm").action =
					`/projects/${projectId}/members/${id}/delete`;
			});

			document.getElementById("deleteMemberBtn").addEventListener("click", () => {
				if (confirm("本当に削除しますか？")) {
					document.getElementById("deleteMemberForm").submit();
				}
			});
		});
	</script>
	<script>
		document.addEventListener("DOMContentLoaded", () => {
			const modal = document.getElementById("editExpenseModal");

			modal.addEventListener("show.bs.modal", event => {
				const button = event.relatedTarget;

				const id = button.getAttribute("data-id");
				const amount = button.getAttribute("data-amount");
				const desc = button.getAttribute("data-desc");
				const payer = button.getAttribute("data-payer");

				document.getElementById("editExpenseAmount").value = amount;
				document.getElementById("editExpenseDesc").value = desc;
				document.getElementById("editExpensePayer").value = payer;

				document.getElementById("editExpenseForm").action =
					`/projects/${projectId}/expenses/${id}/edit`;

				document.getElementById("deleteExpenseForm").action =
					`/projects/${projectId}/expenses/${id}/delete`;
			});

			document.getElementById("deleteExpenseBtn").addEventListener("click", () => {
				if (confirm("本当に削除しますか？")) {
					document.getElementById("deleteExpenseForm").submit();
				}
			});
		});
	</script>

</body>

</html>
